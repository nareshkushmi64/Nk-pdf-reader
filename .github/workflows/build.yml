name: Build Accessible PDF Reader APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─────────────────────────────────────────────
      # STEP 1: Generate all project source files
      # ─────────────────────────────────────────────
      - name: Generate project source files
        run: |
          python3 - << 'PYEOF'
          import os, base64, textwrap

          def write(path, content):
              parent = os.path.dirname(path)
              if parent:
                  os.makedirs(parent, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f"  ✅ {path}")

          # ── settings.gradle ──────────────────────────────────────────────
          write("settings.gradle.kts", """
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "NKPdfReader"
          include(":app")
          """.strip())

          # ── root build.gradle ────────────────────────────────────────────
          write("build.gradle.kts", """
          plugins {
              id("com.android.application") version "8.3.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.23" apply false
          }
          """.strip())

          # ── gradle.properties ────────────────────────────────────────────
          write("gradle.properties", """
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
          kotlin.code.style=official
          """.strip())

          # ── app/build.gradle ─────────────────────────────────────────────
          write("app/build.gradle.kts", """
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.nareshkushmi.nkpdfreader"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.nareshkushmi.nkpdfreader"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0.0"
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(
                          getDefaultProguardFile("proguard-android-optimize.txt"),
                          "proguard-rules.pro"
                      )
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions { jvmTarget = "17" }

              buildFeatures { viewBinding = true }

              packaging {
                  resources {
                      excludes += "/META-INF/{AL2.0,LGPL2.1}"
                      excludes += "META-INF/DEPENDENCIES"
                  }
              }
          }

          dependencies {
              // AndroidX core
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.appcompat:appcompat:1.7.0")
              implementation("com.google.android.material:material:1.12.0")
              implementation("androidx.constraintlayout:constraintlayout:2.1.4")
              implementation("androidx.recyclerview:recyclerview:1.3.2")
              implementation("androidx.viewpager2:viewpager2:1.1.0")
              implementation("androidx.lifecycle:lifecycle-viewmodel-ktx:2.8.2")
              implementation("androidx.lifecycle:lifecycle-livedata-ktx:2.8.2")
              implementation("androidx.activity:activity-ktx:1.9.0")
              implementation("androidx.fragment:fragment-ktx:1.8.0")

              // Apache PDFBox Android port
              implementation("com.tom-roush:pdfbox-android:2.0.27.0")

              // Google ML Kit OCR
              implementation("com.google.mlkit:text-recognition:16.0.0")
              implementation("com.google.mlkit:text-recognition-devanagari:16.0.0")

              // Coroutines
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0")
          }
          """.strip())

          # ── AndroidManifest.xml ──────────────────────────────────────────
          write("app/src/main/AndroidManifest.xml", """
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <!-- For Android 13+ document access -->
              <uses-permission android:name="android.permission.READ_MEDIA_DOCUMENTS" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.NKPdfReader"
                  android:largeHeap="true">

                  <activity
                      android:name=".ui.MainActivity"
                      android:exported="true"
                      android:label="@string/app_name"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <!-- Open PDF files directly -->
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <data android:mimeType="application/pdf" />
                      </intent-filter>
                  </activity>

                  <activity

name: Build NK Reader APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate project files
        run: |
          python3 - <<'PYEOF'
import os, base64, textwrap

def write(path, content):
    os.makedirs(os.path.dirname(path), exist_ok=True)
    with open(path, 'w', encoding='utf-8') as f:
        f.write(content)

def writeb(path, b64):
    os.makedirs(os.path.dirname(path), exist_ok=True)
    with open(path, 'wb') as f:
        f.write(base64.b64decode(b64))

ROOT      = "NKReader"
PKG       = "com.nareshkushmi.nkreader"
PKG_PATH  = PKG.replace('.', '/')
SRC       = f"{ROOT}/app/src/main/java/{PKG_PATH}"
RES       = f"{ROOT}/app/src/main/res"

# ─── settings.gradle.kts ───────────────────────────────────────────────────
write(f"{ROOT}/settings.gradle.kts", """\
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "NK Reader"
include(":app")
""")


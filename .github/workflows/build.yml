          # ── PdfRepository.kt ─────────────────────────────────────────────
          write("app/src/main/java/com/nareshkushmi/nkpdfreader/data/PdfRepository.kt", """
          package com.nareshkushmi.nkpdfreader.data

          import android.content.Context
          import android.graphics.Bitmap
          import android.graphics.Canvas
          import android.graphics.Color
          import android.net.Uri
          import com.tom_roush.pdfbox.android.PDFBoxResourceLoader
          import com.tom_roush.pdfbox.pdmodel.PDDocument
          import com.tom_roush.pdfbox.rendering.PDFRenderer
          import com.tom_roush.pdfbox.text.PDFTextStripper
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.withContext
          import java.io.InputStream

          class PdfRepository(private val context: Context) {

              private var pdDocument: PDDocument? = null
              private var pdfRenderer: PDFRenderer? = null

              init {
                  PDFBoxResourceLoader.init(context)
              }

              suspend fun openPdf(uri: Uri): Result<Int> = withContext(Dispatchers.IO) {
                  runCatching {
                      pdDocument?.close()
                      val inputStream: InputStream = context.contentResolver.openInputStream(uri)
                          ?: error("Cannot open PDF stream")
                      pdDocument = PDDocument.load(inputStream)
                      pdfRenderer = PDFRenderer(pdDocument!!)
                      pdDocument!!.numberOfPages
                  }
              }

              /**
               * Render a single PDF page as a Bitmap.
               * [dpi] default 150 — good balance of quality and memory.
               * [nightMode] inverts colors for dark reading.
               */
              suspend fun renderPage(
                  pageIndex: Int,
                  dpi: Float = 150f,
                  nightMode: Boolean = false
              ): Result<Bitmap> = withContext(Dispatchers.IO) {
                  runCatching {
                      val renderer = pdfRenderer ?: error("PDF not opened")
                      var bitmap = renderer.renderImageWithDPI(pageIndex, dpi)
                      if (nightMode) bitmap = invertBitmap(bitmap)
                      bitmap
                  }
              }

              /**
               * Extract text from a PDF page using PDFBox TextStripper.
               * Returns empty string if page has no selectable text (scanned PDF).
               */
              suspend fun extractTextFromPage(pageIndex: Int): Result<String> =
                  withContext(Dispatchers.IO) {
                      runCatching {
                          val doc = pdDocument ?: error("PDF not opened")
                          val stripper = PDFTextStripper().apply {
                              startPage = pageIndex + 1
                              endPage = pageIndex + 1
                          }
                          stripper.getText(doc).trim()
                      }
                  }

              fun getPageCount(): Int = pdDocument?.numberOfPages ?: 0

              fun closePdf() {
                  pdDocument?.close()
                  pdDocument = null
                  pdfRenderer = null
              }

              private fun invertBitmap(src: Bitmap): Bitmap {
                  val result = Bitmap.createBitmap(src.width, src.height, src.config)
                  val canvas = Canvas(result)
                  canvas.drawColor(Color.BLACK)
                  for (x in 0 until src.width) {
                      for (y in 0 until src.height) {
                          val pixel = src.getPixel(x, y)
                          result.setPixel(
                              x, y,
                              Color.argb(
                                  Color.alpha(pixel),
                                  255 - Color.red(pixel),
                                  255 - Color.green(pixel),
                                  255 - Color.blue(pixel)
                              )
                          )
                      }
                  }
                  return result
              }
          }
          """.strip())

          # ── OcrRepository.kt ─────────────────────────────────────────────
          write("app/src/main/java/com/nareshkushmi/nkpdfreader/data/OcrRepository.kt", """
          package com.nareshkushmi.nkpdfreader.data

          import android.graphics.Bitmap
          import com.google.mlkit.vision.common.InputImage
          import com.google.mlkit.vision.text.TextRecognition
          import com.google.mlkit.vision.text.latin.TextRecognizerOptions
          import com.google.mlkit.vision.text.devanagari.DevanagariTextRecognizerOptions
          import kotlinx.coroutines.tasks.await
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.withContext

          class OcrRepository {

              // Latin script recognizer (English, numbers, etc.)
              private val latinRecognizer = TextRecognition.getClient(TextRecognizerOptions.DEFAULT_OPTIONS)

              // Devanagari recognizer (Nepali / Hindi)
              private val devanagariRecognizer = TextRecognition.getClient(
                  DevanagariTextRecognizerOptions.Builder().build()
              )

              /**
               * Extract text from a rendered PDF page bitmap using ML Kit OCR.
               * Tries Latin first; if result is sparse, also tries Devanagari.
               */
              suspend fun extractTextFromBitmap(
                  bitmap: Bitmap,
                  preferDevanagari: Boolean = false
              ): Result<String> = withContext(Dispatchers.IO) {
                  runCatching {
                      val image = InputImage.fromBitmap(bitmap, 0)
                      val recognizer = if (preferDevanagari) devanagariRecognizer else latinRecognizer
                      val result = recognizer.process(image).await()
                      val text = result.text.trim()

                      // If Latin result is sparse, try Devanagari as fallback
                      if (!preferDevanagari && text.length < 20) {
                          val devResult = devanagariRecognizer.process(image).await()
                          val devText = devResult.text.trim()
                          if (devText.length > text.length) return@runCatching devText
                      }
                      text
                  }
              }

              fun close() {
                  latinRecognizer.close()
                  devanagariRecognizer.close()
              }
          }
          """.strip())

          # ── PdfViewModel.kt ──────────────────────────────────────────────
          write("app/src/main/java/com/nareshkushmi/nkpdfreader/viewmodel/PdfViewModel.kt", """
          package com.nareshkushmi.nkpdfreader.viewmodel

          import android.app.Application
          import android.graphics.Bitmap
          import android.net.Uri
          import androidx.lifecycle.AndroidViewModel
          import androidx.lifecycle.LiveData
          import androidx.lifecycle.MutableLiveData
          import androidx.lifecycle.viewModelScope
          import com.nareshkushmi.nkpdfreader.data.OcrRepository
          import com.nareshkushmi.nkpdfreader.data.PdfRepository
          import kotlinx.coroutines.launch

          sealed class UiState {
              object Idle : UiState()
              object Loading : UiState()
              data class PageReady(val bitmap: Bitmap, val pageIndex: Int, val total: Int) : UiState()
              data class TextReady(val text: String) : UiState()
              data class Error(val message: String) : UiState()
          }

          class PdfViewModel(application: Application) : AndroidViewModel(application) {

              private val pdfRepo = PdfRepository(application)
              private val ocrRepo = OcrRepository()

              private val _uiState = MutableLiveData<UiState>(UiState.Idle)
              val uiState: LiveData<UiState> = _uiState

              private val _currentPage = MutableLiveData(0)
              val currentPage: LiveData<Int> = _currentPage

              var totalPages = 0
                  private set

              var nightMode = false
              var zoomDpi = 150f

              fun openPdf(uri: Uri) {
                  viewModelScope.launch {
                      _uiState.value = UiState.Loading
                      pdfRepo.openPdf(uri).fold(
                          onSuccess = { pageCount ->
                              totalPages = pageCount
                              _currentPage.value = 0
                              renderCurrentPage()
                          },
                          onFailure = { _uiState.value = UiState.Error(it.message ?: "Failed to open PDF") }
                      )
                  }
              }

              fun goToPage(index: Int) {
                  if (index < 0 || index >= totalPages) return
                  _currentPage.value = index
                  renderCurrentPage()
              }

              fun nextPage() = goToPage((_currentPage.value ?: 0) + 1)
              fun prevPage() = goToPage((_currentPage.value ?: 0) - 1)

              private fun renderCurrentPage() {
                  val page = _currentPage.value ?: return
                  viewModelScope.launch {
                      _uiState.value = UiState.Loading
                      pdfRepo.renderPage(page, zoomDpi, nightMode).fold(
                          onSuccess = { bitmap ->
                              _uiState.value = UiState.PageReady(bitmap, page, totalPages)
                          },
                          onFailure = { _uiState.value = UiState.Error(it.message ?: "Render error") }
                      )
                  }
              }

              /**
               * Extract text: tries PDFBox first (fast, accurate for real text).
               * Falls back to ML Kit OCR for scanned/image-based PDFs.
               */
              fun extractText(preferDevanagari: Boolean = false) {
                  val page = _currentPage.value ?: return
                  viewModelScope.launch {
                      _uiState.value = UiState.Loading
                      // 1) Try PDFBox text extraction
                      val pdfText = pdfRepo.extractTextFromPage(page).getOrNull()
                      if (!pdfText.isNullOrBlank() && pdfText.length > 30) {
                          _uiState.value = UiState.TextReady(pdfText)
                          return@launch
                      }
                      // 2) Fallback: OCR on rendered bitmap
                      pdfRepo.renderPage(page, 200f, false).fold(
                          onSuccess = { bitmap ->
                              ocrRepo.extractTextFromBitmap(bitmap, preferDevanagari).fold(
                                  onSuccess = { text ->
                                      _uiState.value = UiState.TextReady(
                                          text.ifBlank { "No text found on this page." }
                                      )
                                  },
                                  onFailure = { _uiState.value = UiState.Error("OCR failed: ${it.message}") }
                              )
                          },
                          onFailure = { _uiState.value = UiState.Error(it.message ?: "Render error") }
                      )
                  }
              }

              override fun onCleared() {
                  super.onCleared()
                  pdfRepo.closePdf()
                  ocrRepo.close()
              }
          }
          """.strip())

          # ── MainActivity.kt ──────────────────────────────────────────────
          write("app/src/main/java/com/nareshkushmi/nkpdfreader/ui/MainActivity.kt", """
          package com.nareshkushmi.nkpdfreader.ui

          import android.content.Intent
          import android.net.Uri
          import android.os.Bundle
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AppCompatActivity
          import com.nareshkushmi.nkpdfreader.databinding.ActivityMainBinding

          class MainActivity : AppCompatActivity() {

              private lateinit var binding: ActivityMainBinding

              private val openPdfLauncher = registerForActivityResult(
                  ActivityResultContracts.GetContent()
              ) { uri: Uri? ->
                  uri?.let { openPdfViewer(it) }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityMainBinding.inflate(layoutInflater)
                  setContentView(binding.root)
                  setSupportActionBar(binding.toolbar)

                  binding.btnOpenPdf.setOnClickListener {
                      openPdfLauncher.launch("application/pdf")
                  }

                  // Handle intent if opened via file manager
                  intent?.data?.let { openPdfViewer(it) }
              }

              private fun openPdfViewer(uri: Uri) {
                  val intent = Intent(this, PdfViewerActivity::class.java).apply {
                      putExtra(PdfViewerActivity.EXTRA_PDF_URI, uri.toString())
                  }
                  startActivity(intent)
              }
          }
          """.strip())

          # ── PdfViewerActivity.kt ─────────────────────────────────────────
          write("app/src/main/java/com/nareshkushmi/nkpdfreader/ui/PdfViewerActivity.kt", """
          package com.nareshkushmi.nkpdfreader.ui

          import android.net.Uri
          import android.os.Bundle
          import android.speech.tts.TextToSpeech
          import android.view.MenuItem
          import android.view.View
          import android.widget.Toast
          import androidx.activity.viewModels
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.view.AccessibilityDelegateCompat
          import androidx.core.view.ViewCompat
          import androidx.core.view.accessibility.AccessibilityNodeInfoCompat
          import com.nareshkushmi.nkpdfreader.databinding.ActivityPdfViewerBinding
          import com.nareshkushmi.nkpdfreader.viewmodel.PdfViewModel
          import com.nareshkushmi.nkpdfreader.viewmodel.UiState
          import java.util.Locale

          class PdfViewerActivity : AppCompatActivity(), TextToSpeech.OnInitListener {

              companion object {
                  const val EXTRA_PDF_URI = "extra_pdf_uri"
              }

              private lateinit var binding: ActivityPdfViewerBinding
              private val viewModel: PdfViewModel by viewModels()
              private var tts: TextToSpeech? = null
              private var ttsReady = false
              private var isReading = false

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityPdfViewerBinding.inflate(layoutInflater)
                  setContentView(binding.root)
                  setSupportActionBar(binding.toolbar)
                  supportActionBar?.setDisplayHomeAsUpEnabled(true)

                  tts = TextToSpeech(this, this)

                  val uriString = intent.getStringExtra(EXTRA_PDF_URI)
                      ?: run { finish(); return }
                  val uri = Uri.parse(uriString)

                  setupViewPager()
                  setupBottomBar()
                  observeViewModel()

                  viewModel.openPdf(uri)
              }

              private fun setupViewPager() {
                  // ViewPager2 handles page swiping
                  binding.viewPager.isUserInputEnabled = true
                  binding.viewPager.registerOnPageChangeCallback(object :
                      androidx.viewpager2.widget.ViewPager2.OnPageChangeCallback() {
                      override fun onPageSelected(position: Int) {
                          viewModel.goToPage(position)
                      }
                  })
              }

              private fun setupBottomBar() {
                  binding.btnPrevPage.setOnClickListener {
                      viewModel.prevPage()
                  }
                  binding.btnNextPage.setOnClickListener {
                      viewModel.nextPage()
                  }

                  // Accessibility: announce page changes
                  ViewCompat.setAccessibilityDelegate(
                      binding.tvPageInfo,
                      object : AccessibilityDelegateCompat() {
                          override fun onInitializeAccessibilityNodeInfo(
                              host: View,
                              info: AccessibilityNodeInfoCompat
                          ) {
                              super.onInitializeAccessibilityNodeInfo(host, info)
                              info.isAccessibilityFocused = true
                          }
                      }
                  )
              }

              private fun observeViewModel() {
                  viewModel.uiState.observe(this) { state ->
                      when (state) {
                          is UiState.Loading -> {
                              binding.loadingOverlay.visibility = View.VISIBLE
                          }
                          is UiState.PageReady -> {
                              binding.loadingOverlay.visibility = View.GONE
                              val desc = getString(
                                  com.nareshkushmi.nkpdfreader.R.string.content_desc_page,
                                  state.pageIndex + 1
                              )
                              // Update page info label for accessibility
                              val pageText = getString(
                                  com.nareshkushmi.nkpdfreader.R.string.page_of,
                                  state.pageIndex + 1,
                                  state.total
                              )
                              binding.tvPageInfo.text = pageText
                              binding.tvPageInfo.contentDescription = pageText
                              // Announce for TalkBack
                              binding.tvPageInfo.announceForAccessibility(pageText)
                          }
                          is UiState.TextReady -> {
                              binding.loadingOverlay.visibility = View.GONE
                              binding.textPanel.visibility = View.VISIBLE
                              binding.tvExtractedText.text = state.text
                              binding.tvExtractedText.announceForAccessibility(
                                  "Text extracted. ${state.text.take(100)}"
                              )
                              if (isReading) speakText(state.text)
                          }
                          is UiState.Error -> {
                              binding.loadingOverlay.visibility = View.GONE
                              Toast.makeText(this, state.message, Toast.LENGTH_LONG).show()
                          }
                          else -> {}
                      }
                  }
              }

              override fun onOptionsItemSelected(item: MenuItem): Boolean {
                  return when (item.itemId) {
                      android.R.id.home -> { onBackPressedDispatcher.onBackPressed(); true }
                      com.nareshkushmi.nkpdfreader.R.id.action_read_aloud -> {
                          if (!ttsReady) {
                              Toast.makeText(this,
                                  getString(com.nareshkushmi.nkpdfreader.R.string.tts_not_available),
                                  Toast.LENGTH_SHORT).show()
                              return true
                          }
                          isReading = !isReading
                          if (isReading) {
                              item.title = getString(com.nareshkushmi.nkpdfreader.R.string.stop_reading)
                              viewModel.extractText()
                          } else {
                              item.title = getString(com.nareshkushmi.nkpdfreader.R.string.read_aloud)
                              tts?.stop()
                          }
                          true
                      }
                      com.nareshkushmi.nkpdfreader.R.id.action_ocr -> {
                          viewModel.extractText(preferDevanagari = false)
                          true
                      }
                      com.nareshkushmi.nkpdfreader.R.id.action_zoom_in -> {
                          viewModel.zoomDpi = (viewModel.zoomDpi + 25f).coerceAtMost(300f)
                          viewModel.goToPage(viewModel.currentPage.value ?: 0)
                          true
                      }
                      com.nareshkushmi.nkpdfreader.R.id.action_zoom_out -> {
                          viewModel.zoomDpi = (viewModel.zoomDpi - 25f).coerceAtLeast(72f)
                          viewModel.goToPage(viewModel.currentPage.value ?: 0)
                          true
                      }
                      com.nareshkushmi.nkpdfreader.R.id.action_night_mode -> {
                          viewModel.nightMode = !viewModel.nightMode
                          viewModel.goToPage(viewModel.currentPage.value ?: 0)
                          true
                      }
                      else -> super.onOptionsItemSelected(item)
                  }
              }

              // ── TextToSpeech ─────────────────────────────────────────────
              override fun onInit(status: Int) {
                  if (status == TextToSpeech.SUCCESS) {
                      tts?.language = Locale.getDefault()
                      ttsReady = true
                  }
              }

              private fun speakText(text: String) {
                  tts?.speak(text, TextToSpeech.QUEUE_FLUSH, null, "pdf_read")
              }

              override fun onDestroy() {
                  tts?.stop()
                  tts?.shutdown()
                  super.onDestroy()
              }
          }
          """.strip())

          # ── PdfAccessibilityService.kt ───────────────────────────────────
          write("app/src/main/java/com/nareshkushmi/nkpdfreader/accessibility/PdfAccessibilityService.kt", """
          package com.nareshkushmi.nkpdfreader.accessibility

          import android.accessibilityservice.AccessibilityService
          import android.view.accessibility.AccessibilityEvent

          /**
           * Accessibility service that enhances PDF page navigation for TalkBack users.
           * Announces page transitions and text content changes automatically.
           */
          class PdfAccessibilityService : AccessibilityService() {

              override fun onAccessibilityEvent(event: AccessibilityEvent) {
                  when (event.eventType) {
                      AccessibilityEvent.TYPE_VIEW_SCROLLED,
                      AccessibilityEvent.TYPE_WINDOW_CONTENT_CHANGED -> {
                          // Let TalkBack handle content changes natively
                          // (views use announceForAccessibility + accessibilityLiveRegion)
                      }
                  }
              }

              override fun onInterrupt() {
                  // Required override
              }
          }
          """.strip())


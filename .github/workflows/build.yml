          @Composable
          private fun TtsEngineSelectorCard(
              availableEngines : List<TtsEngine>,
              selectedEngine   : String,
              isExpanded       : Boolean,
              onToggle         : () -> Unit,
              onDismiss        : () -> Unit,
              onEngineSelected : (String) -> Unit
          ) {
              val selectedLabel = availableEngines
                  .find { it.packageName == selectedEngine }?.label
                  ?: if (selectedEngine == "com.google.android.tts")
                         "Google Text-to-Speech"
                     else selectedEngine

              Column(
                  modifier = Modifier.padding(horizontal = 16.dp, vertical = 8.dp)
              ) {
                  Row(verticalAlignment = Alignment.CenterVertically) {
                      Icon(
                          Icons.Default.RecordVoiceOver,
                          contentDescription = null,
                          tint     = MaterialTheme.colorScheme.primary,
                          modifier = Modifier.size(24.dp)
                      )
                      Spacer(Modifier.width(12.dp))
                      Column(modifier = Modifier.weight(1f)) {
                          Text(
                              "TTS Engine",
                              style      = MaterialTheme.typography.titleSmall,
                              fontWeight = FontWeight.Medium
                          )
                          Text(
                              "Currently: $selectedLabel",
                              style = MaterialTheme.typography.bodySmall,
                              color = MaterialTheme.colorScheme.onSurfaceVariant
                          )
                      }
                  }
                  Spacer(Modifier.height(10.dp))
                  Box {
                      OutlinedButton(
                          onClick  = onToggle,
                          modifier = Modifier.fillMaxWidth()
                      ) {
                          Icon(
                              Icons.Default.RecordVoiceOver,
                              contentDescription = null,
                              modifier = Modifier.size(18.dp)
                          )
                          Spacer(Modifier.width(8.dp))
                          Text(
                              text     = selectedLabel,
                              modifier = Modifier.weight(1f),
                              maxLines = 1
                          )
                          Icon(
                              if (isExpanded) Icons.Default.ExpandLess
                              else            Icons.Default.ExpandMore,
                              contentDescription = null
                          )
                      }
                      DropdownMenu(
                          expanded         = isExpanded,
                          onDismissRequest = onDismiss,
                          modifier         = Modifier.fillMaxWidth(0.85f)
                      ) {
                          if (availableEngines.isEmpty()) {
                              DropdownMenuItem(
                                  text = {
                                      Text(
                                          "No TTS engines found.\\nPlease install Google TTS.",
                                          style = MaterialTheme.typography.bodySmall,
                                          color = MaterialTheme.colorScheme.error
                                      )
                                  },
                                  onClick = onDismiss
                              )
                          } else {
                              availableEngines.forEach { engine ->
                                  val isSelected  = engine.packageName == selectedEngine
                                  val isGoogleTts =
                                      engine.packageName == "com.google.android.tts"
                                  DropdownMenuItem(
                                      text = {
                                          Row(
                                              verticalAlignment = Alignment.CenterVertically
                                          ) {
                                              if (isGoogleTts) {
                                                  Icon(
                                                      Icons.Default.Stars,
                                                      contentDescription = "Recommended",
                                                      tint = MaterialTheme.colorScheme.primary,
                                                      modifier = Modifier.size(16.dp)
                                                  )
                                                  Spacer(Modifier.width(6.dp))
                                              } else {
                                                  Spacer(Modifier.width(22.dp))
                                              }
                                              Column {
                                                  Text(
                                                      engine.label,
                                                      fontWeight = if (isSelected)
                                                          FontWeight.Bold
                                                      else
                                                          FontWeight.Normal
                                                  )
                                                  if (isGoogleTts) {
                                                      Text(
                                                          "Recommended - Default",
                                                          style = MaterialTheme.typography
                                                              .labelSmall,
                                                          color = MaterialTheme
                                                              .colorScheme.primary
                                                      )
                                                  }
                                              }
                                          }
                                      },
                                      trailingIcon = {
                                          if (isSelected) {
                                              Icon(
                                                  Icons.Default.Check,
                                                  contentDescription = "Selected",
                                                  tint = MaterialTheme.colorScheme.primary
                                              )
                                          }
                                      },
                                      onClick = { onEngineSelected(engine.packageName) }
                                  )
                              }
                          }
                      }
                  }
                  Spacer(Modifier.height(4.dp))
                  Text(
                      "Default: Google Text-to-Speech",
                      style    = MaterialTheme.typography.labelSmall,
                      color    = MaterialTheme.colorScheme.onSurfaceVariant,
                      modifier = Modifier.padding(start = 4.dp)
                  )
              }
          }

          @Composable
          private fun SliderSettingItem(
              label        : String,
              value        : Float,
              valueRange   : ClosedFloatingPointRange<Float>,
              steps        : Int,
              displayValue : String,
              icon         : ImageVector,
              onValueChange: (Float) -> Unit
          ) {
              ListItem(
                  headlineContent = {
                      Row(
                          modifier              = Modifier.fillMaxWidth(),
                          horizontalArrangement = Arrangement.SpaceBetween,
                          verticalAlignment     = Alignment.CenterVertically
                      ) {
                          Text(label, fontWeight = FontWeight.Medium)
                          Surface(
                              color = MaterialTheme.colorScheme.primaryContainer,
                              shape = MaterialTheme.shapes.small
                          ) {
                              Text(
                                  displayValue,
                                  modifier = Modifier.padding(
                                      horizontal = 8.dp, vertical = 2.dp
                                  ),
                                  style = MaterialTheme.typography.labelMedium,
                                  color = MaterialTheme.colorScheme.onPrimaryContainer
                              )
                          }
                      }
                  },
                  supportingContent = {
                      Slider(
                          value         = value,
                          onValueChange = onValueChange,
                          valueRange    = valueRange,
                          steps         = steps,
                          modifier      = Modifier.fillMaxWidth()
                      )
                  },
                  leadingContent = {
                      Icon(
                          icon,
                          contentDescription = null,
                          tint = MaterialTheme.colorScheme.primary
                      )
                  }
              )
          }

          @Composable
          private fun SectionHeader(title: String, icon: ImageVector) {
              Row(
                  modifier          = Modifier
                      .fillMaxWidth()
                      .padding(horizontal = 16.dp, vertical = 12.dp),
                  verticalAlignment = Alignment.CenterVertically
              ) {
                  Icon(
                      icon,
                      contentDescription = null,
                      tint     = MaterialTheme.colorScheme.primary,
                      modifier = Modifier.size(20.dp)
                  )
                  Spacer(Modifier.width(8.dp))
                  Text(
                      title,
                      style      = MaterialTheme.typography.titleSmall,
                      color      = MaterialTheme.colorScheme.primary,
                      fontWeight = FontWeight.Bold
                  )
              }
              HorizontalDivider(
                  modifier  = Modifier.padding(horizontal = 16.dp),
                  thickness = 1.dp,
                  color     = MaterialTheme.colorScheme.primary.copy(alpha = 0.3f)
              )
          }
          """)

          print("All files generated successfully!")
          print("Tesseract4Android version: 4.9.0")

          PYTHON_SCRIPT_END
          python3 generate_project.py

      - name: Download Tesseract traineddata
        run: |
          mkdir -p NKReader/app/src/main/assets/tessdata
          curl -L "https://github.com/tesseract-ocr/tessdata_best/raw/main/nep.traineddata" \
               -o NKReader/app/src/main/assets/tessdata/nep.traineddata
          curl -L "https://github.com/tesseract-ocr/tessdata_best/raw/main/eng.traineddata" \
               -o NKReader/app/src/main/assets/tessdata/eng.traineddata
          echo "Tessdata files:"
          ls -lh NKReader/app/src/main/assets/tessdata/

      - name: Install Gradle 8.4 and create wrapper
        run: |
          curl -L "https://services.gradle.org/distributions/gradle-8.4-bin.zip" \
               -o /tmp/gradle-8.4-bin.zip
          unzip -q /tmp/gradle-8.4-bin.zip -d /tmp/gradle-dist
          export GRADLE_HOME=/tmp/gradle-dist/gradle-8.4
          export PATH=$GRADLE_HOME/bin:$PATH
          cd NKReader
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew
          echo "Gradle wrapper created:"
          ls -lh gradle/wrapper/
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x NKReader/gradlew

      - name: Build Release APK
        run: |
          cd NKReader
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NK-Reader-Release-APK
          path: NKReader/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## NK Reader Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | NK Reader |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | com.nareshkushmi.nkreader |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | app-release.apk |" >> $GITHUB_STEP_SUMMARY
          echo "| TTS | Google TTS Default + Engine Selection |" >> $GITHUB_STEP_SUMMARY
          echo "| OCR | Nepali + English Tesseract |" >> $GITHUB_STEP_SUMMARY
          echo "| Tesseract | com.github.adaptech-cz:Tesseract4Android:4.9.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Gradle | 8.4 |" >> $GITHUB_STEP_SUMMARY
          echo "| JitPack | Enabled |" >> $GITHUB_STEP_SUMMARY

name: Build NK Reader APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install Pillow

      - name: Generate project files
        run: |
          cat > generate_project.py << 'PYTHON_SCRIPT_END'
          #!/usr/bin/env python3
          import os
          from PIL import Image, ImageDraw, ImageFont

          def mkdir(path):
              os.makedirs(path, exist_ok=True)

          def write(path, content):
              mkdir(os.path.dirname(path))
              with open(path, "w", encoding="utf-8") as f:
                  f.write(content)

          ROOT   = "NKReader"
          APP    = f"{ROOT}/app"
          SRC    = f"{APP}/src/main/java/com/nareshkushmi/nkreader"
          RES    = f"{APP}/src/main/res"
          ASSETS = f"{APP}/src/main/assets"

          # ════════════════════════════════════════════════════════
          # 1. Root build.gradle
          # ════════════════════════════════════════════════════════
          write(f"{ROOT}/build.gradle", """\
          buildscript {
              ext {
                  compose_version = '1.5.4'
              }
          }
          plugins {
              id 'com.android.application' version '8.1.2' apply false
              id 'com.android.library'     version '8.1.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.10' apply false
          }
          """)

          # ════════════════════════════════════════════════════════
          # 2. settings.gradle
          # ════════════════════════════════════════════════════════
          write(f"{ROOT}/settings.gradle", """\
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          rootProject.name = "NKReader"
          include ':app'
          """)

          # ════════════════════════════════════════════════════════
          # 3. gradle.properties
          # ════════════════════════════════════════════════════════
          write(f"{ROOT}/gradle.properties", """\
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          android.nonTransitiveRClass=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=false
          """)

          # ════════════════════════════════════════════════════════
          # 4. gradle/wrapper/gradle-wrapper.properties
          # ════════════════════════════════════════════════════════
          write(f"{ROOT}/gradle/wrapper/gradle-wrapper.properties", """\
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          """)

          # ════════════════════════════════════════════════════════
          # 5. app/build.gradle
          # ════════════════════════════════════════════════════════
          write(f"{APP}/build.gradle", """\
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace         'com.nareshkushmi.nkreader'
              compileSdk        34

              defaultConfig {
                  applicationId   "com.nareshkushmi.nkreader"
                  minSdk          26
                  targetSdk       34
                  versionCode     1
                  versionName     "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled   false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                                    'proguard-rules.pro'
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }

              buildFeatures {
                  compose true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion '1.5.4'
              }

              packagingOptions {
                  resources {
                      excludes += '/META-INF/{AL2.0,LGPL2.1}'
                  }
              }
          }

          dependencies {
              def composeBom = platform('androidx.compose:compose-bom:2023.10.01')
              implementation composeBom
              implementation 'androidx.compose.ui:ui'
              implementation 'androidx.compose.ui:ui-graphics'
              implementation 'androidx.compose.ui:ui-tooling-preview'
              implementation 'androidx.compose.material3:material3'
              implementation 'androidx.compose.material:material-icons-extended'
              implementation 'androidx.activity:activity-compose:1.8.1'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
              implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.6.2'
              implementation 'androidx.navigation:navigation-compose:2.7.5'
              implementation 'androidx.datastore:datastore-preferences:1.0.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
              implementation 'com.tom-roush:pdfbox-android:2.0.27.0'
              implementation 'com.github.adaptech-cz:Tesseract4Android:4.9.0'
              debugImplementation 'androidx.compose.ui:ui-tooling'
              debugImplementation 'androidx.compose.ui:ui-test-manifest'
          }
          """)

          # ════════════════════════════════════════════════════════
          # 6. AndroidManifest.xml
          # ════════════════════════════════════════════════════════
          write(f"{APP}/src/main/AndroidManifest.xml", """\
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.READ_MEDIA_DOCUMENTS"/>
              <uses-permission android:name="android.permission.INTERNET"/>

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.NKReader"
                  android:largeHeap="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW"/>
                          <action android:name="android.intent.action.EDIT"/>
                          <action android:name="android.intent.action.PICK"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:mimeType="application/pdf"/>
                          <data android:mimeType="image/*"/>
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          """)

          # ════════════════════════════════════════════════════════
          # 7. Resources
          # ════════════════════════════════════════════════════════
          write(f"{RES}/values/strings.xml", """\
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">NK Reader</string>
          </resources>
          """)

          write(f"{RES}/values/themes.xml", """\
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.NKReader"
                     parent="android:Theme.Material.Light.NoActionBar"/>
          </resources>
          """)

          write(f"{RES}/xml/file_paths.xml", """\
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="external_files" path="."/>
              <cache-path     name="cache_files"   path="."/>
          </paths>
          """)

          # ════════════════════════════════════════════════════════
          # 8. Launcher Icon
          # ════════════════════════════════════════════════════════
          def make_icon(size):
              img  = Image.new("RGBA", (size, size), (63, 81, 181, 255))
              draw = ImageDraw.Draw(img)
              draw.ellipse(
                  [size*0.1, size*0.1, size*0.9, size*0.9],
                  fill=(255, 255, 255, 40)
              )
              font_size = int(size * 0.45)
              try:
                  font = ImageFont.truetype(
                      "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",
                      font_size
                  )
              except Exception:
                  font = ImageFont.load_default()
              text = "NK"
              bbox = draw.textbbox((0, 0), text, font=font)
              tw, th = bbox[2]-bbox[0], bbox[3]-bbox[1]
              draw.text(((size-tw)//2, (size-th)//2), text, fill="white", font=font)
              return img

          for dpi, sz in [("mdpi",48),("hdpi",72),("xhdpi",96),
                          ("xxhdpi",144),("xxxhdpi",192)]:
              for name in ["ic_launcher","ic_launcher_round"]:
                  path = f"{RES}/mipmap-{dpi}/{name}.png"
                  mkdir(os.path.dirname(path))
                  make_icon(sz).save(path)

          # ════════════════════════════════════════════════════════
          # 9. proguard-rules.pro
          # ════════════════════════════════════════════════════════
          write(f"{APP}/proguard-rules.pro", """\
          -keep class com.googlecode.tesseract.android.** { *; }
          -keep class com.tom_roush.pdfbox.**              { *; }
          -dontwarn org.apache.**
          """)

          # ════════════════════════════════════════════════════════
          # 10-A. MainActivity.kt
          # ════════════════════════════════════════════════════════
          write(f"{SRC}/MainActivity.kt", """\
          package com.nareshkushmi.nkreader

          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.material3.Surface
          import androidx.compose.runtime.collectAsState
          import androidx.compose.runtime.getValue
          import com.nareshkushmi.nkreader.data.AppSettings
          import com.nareshkushmi.nkreader.data.dataStore
          import com.nareshkushmi.nkreader.ui.theme.NKReaderTheme
          import com.nareshkushmi.nkreader.ui.navigation.NKReaderNavHost
          import kotlinx.coroutines.flow.map

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContent {
                      val isDark by applicationContext.dataStore.data
                          .map { it[AppSettings.DARK_MODE_KEY] ?: false }
                          .collectAsState(initial = false)

                      NKReaderTheme(darkTheme = isDark) {
                          Surface {
                              NKReaderNavHost()
                          }
                      }
                  }
              }
          }
          """)

          # ════════════════════════════════════════════════════════
          # 10-B. Theme
          # ════════════════════════════════════════════════════════
          write(f"{SRC}/ui/theme/NKReaderTheme.kt", """\
          package com.nareshkushmi.nkreader.ui.theme

          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.graphics.Color

          private val LightColors = lightColorScheme(
              primary          = Color(0xFF3F51B5),
              onPrimary        = Color.White,
              primaryContainer = Color(0xFFDDE1FF),
              secondary        = Color(0xFF5C6BC0),
              background       = Color(0xFFFAFAFA),
              surface          = Color.White,
          )

          private val DarkColors = darkColorScheme(
              primary          = Color(0xFF9FA8DA),
              onPrimary        = Color(0xFF1A237E),
              primaryContainer = Color(0xFF283593),
              secondary        = Color(0xFF7986CB),
              background       = Color(0xFF121212),
              surface          = Color(0xFF1E1E1E),
          )

          @Composable
          fun NKReaderTheme(
              darkTheme: Boolean = false,
              content: @Composable () -> Unit
          ) {
              MaterialTheme(
                  colorScheme = if (darkTheme) DarkColors else LightColors,
                  content     = content
              )
          }
          """)

          # ════════════════════════════════════════════════════════
          # 10-C. Navigation
          # ════════════════════════════════════════════════════════
          write(f"{SRC}/ui/navigation/NKReaderNavHost.kt", """\
          package com.nareshkushmi.nkreader.ui.navigation

          import androidx.compose.runtime.Composable
          import androidx.navigation.compose.NavHost
          import androidx.navigation.compose.composable
          import androidx.navigation.compose.rememberNavController
          import com.nareshkushmi.nkreader.ui.home.HomeScreen
          import com.nareshkushmi.nkreader.ui.reader.ReaderScreen
          import com.nareshkushmi.nkreader.ui.settings.SettingsScreen

          sealed class Screen(val route: String) {
              object Home     : Screen("home")
              object Reader   : Screen("reader")
              object Settings : Screen("settings")
          }

          @Composable
          fun NKReaderNavHost() {
              val navController = rememberNavController()
              NavHost(
                  navController    = navController,
                  startDestination = Screen.Home.route
              ) {
                  composable(Screen.Home.route) {
                      HomeScreen(
                          onOpenFile     = { navController.navigate(Screen.Reader.route) },
                          onOpenSettings = { navController.navigate(Screen.Settings.route) }
                      )
                  }
                  composable(Screen.Reader.route) {
                      ReaderScreen(
                          onNavigateBack = { navController.popBackStack() },
                          onOpenSettings = { navController.navigate(Screen.Settings.route) }
                      )
                  }
                  composable(Screen.Settings.route) {
                      SettingsScreen(
                          onNavigateBack = { navController.popBackStack() }
                      )
                  }
              }
          }
          """)

          # ════════════════════════════════════════════════════════
          # 10-D. AppSettings DataStore
          # ════════════════════════════════════════════════════════
          write(f"{SRC}/data/AppSettings.kt", """\
          package com.nareshkushmi.nkreader.data

          import android.content.Context
          import androidx.datastore.core.DataStore
          import androidx.datastore.preferences.core.*
          import androidx.datastore.preferences.preferencesDataStore

          val Context.dataStore: DataStore<Preferences> by preferencesDataStore(
              name = "nk_reader_settings"
          )

          object AppSettings {
              val FONT_SIZE_KEY  = floatPreferencesKey("font_size")
              val DARK_MODE_KEY  = booleanPreferencesKey("dark_mode")
              val TTS_ENGINE_KEY = stringPreferencesKey("tts_engine")
              val TTS_PITCH_KEY  = floatPreferencesKey("tts_pitch")
              val TTS_SPEED_KEY  = floatPreferencesKey("tts_speed")

              const val DEFAULT_FONT_SIZE  = 16f
              const val DEFAULT_TTS_ENGINE = "com.google.android.tts"
              const val DEFAULT_TTS_PITCH  = 1.0f
              const val DEFAULT_TTS_SPEED  = 1.0f
          }
          """)

          # ════════════════════════════════════════════════════════
          # 10-E. TtsManager
          # ════════════════════════════════════════════════════════
          write(f"{SRC}/tts/TtsManager.kt", """\
          package com.nareshkushmi.nkreader.tts

          import android.content.Context
          import android.speech.tts.TextToSpeech
          import android.speech.tts.UtteranceProgressListener
          import android.util.Log
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.StateFlow
          import java.util.Locale

          data class TtsEngine(
              val packageName: String,
              val label: String
          )

          class TtsManager(private val context: Context) {

              companion object {
                  private const val TAG = "TtsManager"
              }

              private var tts: TextToSpeech? = null
              private var isInitialized = false
              private var pendingText: String? = null

              private val _isSpeaking = MutableStateFlow(false)
              val isSpeaking: StateFlow<Boolean> = _isSpeaking

              private val _isReady = MutableStateFlow(false)
              val isReady: StateFlow<Boolean> = _isReady

              fun getAvailableEngines(): List<TtsEngine> {
                  return try {
                      val probe = TextToSpeech(context, null)
                      val list  = probe.engines.map { TtsEngine(it.name, it.label) }
                      probe.shutdown()
                      list.sortedByDescending {
                          it.packageName == "com.google.android.tts"
                      }
                  } catch (e: Exception) {
                      Log.e(TAG, "getAvailableEngines error: ${e.message}")
                      emptyList()
                  }
              }

              fun initialize(
                  enginePackage: String        = "com.google.android.tts",
                  pitch        : Float         = 1.0f,
                  speed        : Float         = 1.0f,
                  onReady      : (() -> Unit)? = null,
                  onError      : (() -> Unit)? = null
              ) {
                  shutdown()
                  isInitialized  = false
                  _isReady.value = false

                  tts = TextToSpeech(context, { status ->
                      if (status == TextToSpeech.SUCCESS) {
                          val result = tts?.setLanguage(Locale("ne", "NP"))
                          if (result == TextToSpeech.LANG_MISSING_DATA ||
                              result == TextToSpeech.LANG_NOT_SUPPORTED) {
                              tts?.language = Locale.ENGLISH
                          }
                          tts?.setPitch(pitch)
                          tts?.setSpeechRate(speed)
                          tts?.setOnUtteranceProgressListener(
                              object : UtteranceProgressListener() {
                                  override fun onStart(id: String?) {
                                      _isSpeaking.value = true
                                  }
                                  override fun onDone(id: String?) {
                                      _isSpeaking.value = false
                                  }
                                  override fun onError(id: String?) {
                                      _isSpeaking.value = false
                                  }
                              }
                          )
                          isInitialized  = true
                          _isReady.value = true
                          onReady?.invoke()
                          pendingText?.let {
                              speak(it)
                              pendingText = null
                          }
                      } else {
                          Log.e(TAG, "TTS init failed: status=$status engine=$enginePackage")
                          onError?.invoke()
                      }
                  }, enginePackage)
              }

              fun speak(text: String) {
                  if (!isInitialized || tts == null) {
                      pendingText = text
                      return
                  }
                  tts?.speak(
                      text,
                      TextToSpeech.QUEUE_FLUSH,
                      null,
                      "NK_${System.currentTimeMillis()}"
                  )
              }

              fun stop() {
                  tts?.stop()
                  _isSpeaking.value = false
              }

              fun updatePitch(pitch: Float) { tts?.setPitch(pitch) }
              fun updateSpeed(speed: Float) { tts?.setSpeechRate(speed) }

              fun shutdown() {
                  try {
                      tts?.stop()
                      tts?.shutdown()
                  } catch (_: Exception) {}
                  tts               = null
                  isInitialized     = false
                  _isSpeaking.value = false
                  _isReady.value    = false
              }
          }
          """)

          # ════════════════════════════════════════════════════════
          # 10-F. HomeViewModel
          # ════════════════════════════════════════════════════════
          write(f"{SRC}/ui/home/HomeViewModel.kt", """\
          package com.nareshkushmi.nkreader.ui.home

          import android.net.Uri
          import androidx.lifecycle.ViewModel
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.StateFlow

          object CurrentFileHolder {
              var uri: Uri? = null
          }

          class HomeViewModel : ViewModel() {
              private val _selectedUri = MutableStateFlow<Uri?>(null)
              val selectedUri: StateFlow<Uri?> = _selectedUri

              fun setSelectedUri(uri: Uri) {
                  _selectedUri.value    = uri
                  CurrentFileHolder.uri = uri
              }
          }
          """)

          # ════════════════════════════════════════════════════════
          # 10-G. HomeScreen
          # ════════════════════════════════════════════════════════
          write(f"{SRC}/ui/home/HomeScreen.kt", """\
          package com.nareshkushmi.nkreader.ui.home

          import android.net.Uri
          import androidx.activity.compose.rememberLauncherForActivityResult
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.compose.foundation.layout.*
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.platform.LocalContext
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.text.style.TextAlign
          import androidx.compose.ui.unit.dp
          import androidx.lifecycle.viewmodel.compose.viewModel

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          fun HomeScreen(
              onOpenFile    : () -> Unit,
              onOpenSettings: () -> Unit,
              viewModel     : HomeViewModel = viewModel()
          ) {
              val context = LocalContext.current

              val filePicker = rememberLauncherForActivityResult(
                  ActivityResultContracts.OpenDocument()
              ) { uri: Uri? ->
                  uri?.let {
                      context.contentResolver.takePersistableUriPermission(
                          it,
                          android.content.Intent.FLAG_GRANT_READ_URI_PERMISSION
                      )
                      viewModel.setSelectedUri(it)
                      onOpenFile()
                  }
              }

              Scaffold(
                  topBar = {
                      TopAppBar(
                          title = {
                              Text("NK Reader", fontWeight = FontWeight.Bold)
                          },
                          actions = {
                              IconButton(onClick = onOpenSettings) {
                                  Icon(
                                      Icons.Default.Settings,
                                      contentDescription = "Settings"
                                  )
                              }
                          },
                          colors = TopAppBarDefaults.topAppBarColors(
                              containerColor         = MaterialTheme.colorScheme.primary,
                              titleContentColor      = MaterialTheme.colorScheme.onPrimary,
                              actionIconContentColor = MaterialTheme.colorScheme.onPrimary
                          )
                      )
                  }
              ) { padding ->
                  Box(
                      modifier         = Modifier
                          .fillMaxSize()
                          .padding(padding),
                      contentAlignment = Alignment.Center
                  ) {
                      Column(
                          horizontalAlignment = Alignment.CenterHorizontally,
                          verticalArrangement = Arrangement.spacedBy(24.dp),
                          modifier            = Modifier.padding(32.dp)
                      ) {
                          Icon(
                              Icons.Default.MenuBook,
                              contentDescription = null,
                              modifier = Modifier.size(96.dp),
                              tint     = MaterialTheme.colorScheme.primary
                          )
                          Text(
                              "NK Reader",
                              style      = MaterialTheme.typography.headlineMedium,
                              fontWeight = FontWeight.Bold
                          )
                          Text(
                              "PDF र Image files पढ्नुहोस्\\nNepali OCR र Text-to-Speech सहित",
                              style     = MaterialTheme.typography.bodyLarge,
                              textAlign = TextAlign.Center,
                              color     = MaterialTheme.colorScheme.onSurfaceVariant
                          )
                          Spacer(Modifier.height(8.dp))
                          Button(
                              onClick  = {
                                  filePicker.launch(
                                      arrayOf("application/pdf", "image/*")
                                  )
                              },
                              modifier = Modifier
                                  .fillMaxWidth()
                                  .height(56.dp)
                          ) {
                              Icon(Icons.Default.FolderOpen, contentDescription = null)
                              Spacer(Modifier.width(8.dp))
                              Text(
                                  "File खोल्नुहोस्",
                                  style = MaterialTheme.typography.titleMedium
                              )
                          }
                          OutlinedButton(
                              onClick  = onOpenSettings,
                              modifier = Modifier
                                  .fillMaxWidth()
                                  .height(56.dp)
                          ) {
                              Icon(Icons.Default.Settings, contentDescription = null)
                              Spacer(Modifier.width(8.dp))
                              Text(
                                  "Settings",
                                  style = MaterialTheme.typography.titleMedium
                              )
                          }
                      }
                  }
              }
          }
          """)

          # ════════════════════════════════════════════════════════
          # 10-H. ReaderViewModel
          # ════════════════════════════════════════════════════════
          write(f"{SRC}/ui/reader/ReaderViewModel.kt", """\
          package com.nareshkushmi.nkreader.ui.reader

          import android.app.Application
          import android.graphics.Bitmap
          import android.graphics.BitmapFactory
          import android.graphics.pdf.PdfRenderer
          import android.net.Uri
          import android.util.Log
          import androidx.lifecycle.AndroidViewModel
          import androidx.lifecycle.viewModelScope
          import com.googlecode.tesseract.android.TessBaseAPI
          import com.nareshkushmi.nkreader.data.AppSettings
          import com.nareshkushmi.nkreader.data.dataStore
          import com.nareshkushmi.nkreader.tts.TtsManager
          import com.nareshkushmi.nkreader.ui.home.CurrentFileHolder
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.flow.*
          import kotlinx.coroutines.launch
          import java.io.File

          data class ReaderUiState(
              val pages       : List<String> = emptyList(),
              val currentPage : Int          = 0,
              val isProcessing: Boolean      = false,
              val progress    : String       = "",
              val fontSize    : Float        = AppSettings.DEFAULT_FONT_SIZE,
              val error       : String?      = null
          )

          class ReaderViewModel(application: Application) : AndroidViewModel(application) {

              private val ttsManager = TtsManager(application)

              val isSpeaking: StateFlow<Boolean> = ttsManager.isSpeaking
              val isTtsReady: StateFlow<Boolean> = ttsManager.isReady

              private val _uiState = MutableStateFlow(ReaderUiState())
              val uiState: StateFlow<ReaderUiState> = _uiState.asStateFlow()

              init {
                  viewModelScope.launch {
                      application.dataStore.data
                          .map { prefs ->
                              Triple(
                                  prefs[AppSettings.TTS_ENGINE_KEY]
                                      ?: AppSettings.DEFAULT_TTS_ENGINE,
                                  prefs[AppSettings.TTS_PITCH_KEY]
                                      ?: AppSettings.DEFAULT_TTS_PITCH,
                                  prefs[AppSettings.TTS_SPEED_KEY]
                                      ?: AppSettings.DEFAULT_TTS_SPEED
                              )
                          }
                          .distinctUntilChanged()
                          .collect { (engine, pitch, speed) ->
                              ttsManager.initialize(
                                  enginePackage = engine,
                                  pitch         = pitch,
                                  speed         = speed
                              )
                          }
                  }

                  viewModelScope.launch {
                      application.dataStore.data
                          .map { it[AppSettings.FONT_SIZE_KEY]
                              ?: AppSettings.DEFAULT_FONT_SIZE }
                          .distinctUntilChanged()
                          .collect { size ->
                              _uiState.update { it.copy(fontSize = size) }
                          }
                  }

                  CurrentFileHolder.uri?.let { processFile(it) }
              }

              fun processFile(uri: Uri) {
                  viewModelScope.launch(Dispatchers.IO) {
                      _uiState.update {
                          it.copy(isProcessing = true, error = null, pages = emptyList())
                      }
                      try {
                          val mimeType = getApplication<Application>()
                              .contentResolver.getType(uri) ?: ""
                          val pages = when {
                              mimeType == "application/pdf"  -> processPdf(uri)
                              mimeType.startsWith("image/") -> listOf(processImage(uri))
                              else -> listOf("Unsupported file type: $mimeType")
                          }
                          _uiState.update {
                              it.copy(
                                  pages        = pages,
                                  currentPage  = 0,
                                  isProcessing = false,
                                  progress     = ""
                              )
                          }
                      } catch (e: Exception) {
                          Log.e("ReaderVM", "processFile error", e)
                          _uiState.update {
                              it.copy(
                                  isProcessing = false,
                                  error        = e.message ?: "Unknown error"
                              )
                          }
                      }
                  }
              }

              private fun processPdf(uri: Uri): List<String> {
                  val app      = getApplication<Application>()
                  val pfd      = app.contentResolver.openFileDescriptor(uri, "r")
                              ?: return emptyList()
                  val renderer = PdfRenderer(pfd)
                  val pages    = mutableListOf<String>()
                  for (i in 0 until renderer.pageCount) {
                      _uiState.update {
                          it.copy(
                              progress = "Page ${i+1}/${renderer.pageCount} processing..."
                          )
                      }
                      val page  = renderer.openPage(i)
                      val scale = 2.0f
                      val bmp   = Bitmap.createBitmap(
                          (page.width  * scale).toInt(),
                          (page.height * scale).toInt(),
                          Bitmap.Config.ARGB_8888
                      )
                      page.render(bmp, null, null, PdfRenderer.Page.RENDER_MODE_FOR_DISPLAY)
                      page.close()
                      pages.add(runOcr(bmp, i + 1, renderer.pageCount))
                      bmp.recycle()
                  }
                  renderer.close()
                  pfd.close()
                  return pages
              }

              private fun processImage(uri: Uri): String {
                  _uiState.update { it.copy(progress = "Image processing...") }
                  val app = getApplication<Application>()
                  val ins = app.contentResolver.openInputStream(uri) ?: return ""
                  val bmp = BitmapFactory.decodeStream(ins)
                  ins.close()
                  return runOcr(bmp, 1, 1)
              }

              private fun runOcr(bmp: Bitmap, page: Int, total: Int): String {
                  val app      = getApplication<Application>()
                  val tessDir  = File(app.filesDir, "tesseract").apply { mkdirs() }
                  val tessData = File(tessDir, "tessdata").apply { mkdirs() }
                  for (lang in listOf("nep", "eng")) {
                      val dest = File(tessData, "$lang.traineddata")
                      if (!dest.exists()) {
                          try {
                              app.assets.open("tessdata/$lang.traineddata")
                                  .copyTo(dest.outputStream())
                          } catch (e: Exception) {
                              Log.w("OCR", "copy failed: ${e.message}")
                          }
                      }
                  }
                  val tess = TessBaseAPI()
                  return try {
                      if (tess.init(tessDir.absolutePath, "nep+eng")) {
                          tess.setImage(bmp)
                          val text = tess.utF8Text ?: ""
                          _uiState.update {
                              it.copy(progress = "Page $page/$total done")
                          }
                          text.trim()
                      } else {
                          "OCR initialization failed"
                      }
                  } catch (e: Exception) {
                      Log.e("OCR", "runOcr error", e)
                      "OCR Error: ${e.message}"
                  } finally {
                      tess.recycle()
                  }
              }

              fun nextPage() {
                  val s = _uiState.value
                  if (s.currentPage < s.pages.size - 1) {
                      stopSpeech()
                      _uiState.update { it.copy(currentPage = it.currentPage + 1) }
                  }
              }

              fun prevPage() {
                  val s = _uiState.value
                  if (s.currentPage > 0) {
                      stopSpeech()
                      _uiState.update { it.copy(currentPage = it.currentPage - 1) }
                  }
              }

              fun toggleSpeech() {
                  val text = _uiState.value.let { s ->
                      s.pages.getOrNull(s.currentPage) ?: ""
                  }
                  if (text.isBlank()) return
                  if (isSpeaking.value) stopSpeech() else ttsManager.speak(text)
              }

              fun stopSpeech() { ttsManager.stop() }

              override fun onCleared() {
                  super.onCleared()
                  ttsManager.shutdown()
              }
          }
          """)


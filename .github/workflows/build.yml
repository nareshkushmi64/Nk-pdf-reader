package com.nareshkushmi.nkreader.ui

import androidx.compose.runtime.Composable
import androidx.navigation.compose.NavHost
import androidx.navigation.compose.composable
import androidx.navigation.compose.rememberNavController
import com.nareshkushmi.nkreader.ui.screen.HomeScreen
import com.nareshkushmi.nkreader.ui.screen.ReaderScreen
import com.nareshkushmi.nkreader.ui.screen.SettingsScreen

@Composable
fun NKReaderNavHost() {
    val navController = rememberNavController()
    NavHost(navController = navController, startDestination = "home") {
        composable("home")     { HomeScreen(navController) }
        composable("reader")   { ReaderScreen(navController) }
        composable("settings") { SettingsScreen(navController) }
    }
}
""")


          package com.nareshkushmi.nkreader.ui.settings

          import android.app.Application
          import android.content.Intent
          import androidx.datastore.preferences.core.edit
          import androidx.lifecycle.AndroidViewModel
          import androidx.lifecycle.viewModelScope
          import com.nareshkushmi.nkreader.data.AppSettings
          import com.nareshkushmi.nkreader.data.dataStore
          import com.nareshkushmi.nkreader.tts.TtsEngine
          import com.nareshkushmi.nkreader.tts.TtsManager
          import kotlinx.coroutines.flow.*
          import kotlinx.coroutines.launch

          data class SettingsUiState(
              val fontSize                   : Float           = AppSettings.DEFAULT_FONT_SIZE,
              val isDarkMode                 : Boolean         = false,
              val selectedTtsEngine          : String          = AppSettings.DEFAULT_TTS_ENGINE,
              val ttsPitch                   : Float           = AppSettings.DEFAULT_TTS_PITCH,
              val ttsSpeed                   : Float           = AppSettings.DEFAULT_TTS_SPEED,
              val availableTtsEngines        : List<TtsEngine> = emptyList(),
              val isTtsEngineDropdownExpanded: Boolean         = false
          )

          class SettingsViewModel(application: Application) : AndroidViewModel(application) {

              private val ttsManager = TtsManager(application)

              private val _uiState = MutableStateFlow(SettingsUiState())
              val uiState: StateFlow<SettingsUiState> = _uiState.asStateFlow()

              init {
                  viewModelScope.launch {
                      getApplication<Application>().dataStore.data.collect { prefs ->
                          _uiState.update {
                              it.copy(
                                  fontSize          = prefs[AppSettings.FONT_SIZE_KEY]
                                                      ?: AppSettings.DEFAULT_FONT_SIZE,
                                  isDarkMode        = prefs[AppSettings.DARK_MODE_KEY]
                                                      ?: false,
                                  selectedTtsEngine = prefs[AppSettings.TTS_ENGINE_KEY]
                                                      ?: AppSettings.DEFAULT_TTS_ENGINE,
                                  ttsPitch          = prefs[AppSettings.TTS_PITCH_KEY]
                                                      ?: AppSettings.DEFAULT_TTS_PITCH,
                                  ttsSpeed          = prefs[AppSettings.TTS_SPEED_KEY]
                                                      ?: AppSettings.DEFAULT_TTS_SPEED
                              )
                          }
                      }
                  }
                  loadAvailableEngines()
              }

              fun loadAvailableEngines() {
                  viewModelScope.launch {
                      val engines = ttsManager.getAvailableEngines()
                      _uiState.update { it.copy(availableTtsEngines = engines) }
                  }
              }

              fun selectTtsEngine(packageName: String) {
                  viewModelScope.launch {
                      getApplication<Application>().dataStore.edit { prefs ->
                          prefs[AppSettings.TTS_ENGINE_KEY] = packageName
                      }
                      _uiState.update {
                          it.copy(
                              selectedTtsEngine           = packageName,
                              isTtsEngineDropdownExpanded = false
                          )
                      }
                  }
              }

              fun toggleEngineDropdown() {
                  _uiState.update {
                      it.copy(
                          isTtsEngineDropdownExpanded = !it.isTtsEngineDropdownExpanded
                      )
                  }
              }

              fun dismissEngineDropdown() {
                  _uiState.update { it.copy(isTtsEngineDropdownExpanded = false) }
              }

              fun updatePitch(pitch: Float) {
                  viewModelScope.launch {
                      getApplication<Application>().dataStore.edit { prefs ->
                          prefs[AppSettings.TTS_PITCH_KEY] = pitch
                      }
                      _uiState.update { it.copy(ttsPitch = pitch) }
                      ttsManager.updatePitch(pitch)
                  }
              }

              fun updateSpeed(speed: Float) {
                  viewModelScope.launch {
                      getApplication<Application>().dataStore.edit { prefs ->
                          prefs[AppSettings.TTS_SPEED_KEY] = speed
                      }
                      _uiState.update { it.copy(ttsSpeed = speed) }
                      ttsManager.updateSpeed(speed)
                  }
              }

              fun updateFontSize(size: Float) {
                  viewModelScope.launch {
                      getApplication<Application>().dataStore.edit { prefs ->
                          prefs[AppSettings.FONT_SIZE_KEY] = size
                      }
                      _uiState.update { it.copy(fontSize = size) }
                  }
              }

              fun toggleDarkMode(enabled: Boolean) {
                  viewModelScope.launch {
                      getApplication<Application>().dataStore.edit { prefs ->
                          prefs[AppSettings.DARK_MODE_KEY] = enabled
                      }
                      _uiState.update { it.copy(isDarkMode = enabled) }
                  }
              }

              fun openSystemTtsSettings() {
                  val ttsIntent = Intent("com.android.settings.TTS_SETTINGS").apply {
                      flags = Intent.FLAG_ACTIVITY_NEW_TASK
                  }
                  val fallback = Intent(
                      android.provider.Settings.ACTION_SETTINGS
                  ).apply {
                      flags = Intent.FLAG_ACTIVITY_NEW_TASK
                  }
                  try {
                      getApplication<Application>().startActivity(ttsIntent)
                  } catch (_: Exception) {
                      try {
                          getApplication<Application>().startActivity(fallback)
                      } catch (_: Exception) {}
                  }
              }

              override fun onCleared() {
                  super.onCleared()
                  ttsManager.shutdown()
              }
          }
          """)


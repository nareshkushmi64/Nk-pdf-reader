# ─── OCR Engine ────────────────────────────────────────────────────────────
write(f"{SRC}/ocr/OcrEngine.kt", """\
package com.nareshkushmi.nkreader.ocr

import android.content.Context
import android.graphics.Bitmap
import android.graphics.pdf.PdfRenderer
import android.net.Uri
import com.google.mlkit.vision.common.InputImage
import com.google.mlkit.vision.text.TextRecognition
import com.google.mlkit.vision.text.devanagari.DevanagariTextRecognizerOptions
import kotlinx.coroutines.flow.Flow
import kotlinx.coroutines.flow.flow
import kotlinx.coroutines.suspendCancellableCoroutine
import kotlin.coroutines.resume

class OcrEngine(private val context: Context) {

    private val recognizer = TextRecognition.getClient(
        DevanagariTextRecognizerOptions.Builder().build()
    )

    // Image OCR
    fun recognizeImage(uri: Uri): Flow<OcrResult> = flow {
        emit(OcrResult.Loading)
        try {
            val bitmap = android.provider.MediaStore.Images.Media
                .getBitmap(context.contentResolver, uri)
            val text = performOcr(bitmap)
            emit(OcrResult.Success(text))
        } catch (e: Exception) {
            emit(OcrResult.Error(e.message ?: "OCR failed"))
        }
    }

    // PDF OCR (page by page)
    fun recognizePdf(uri: Uri): Flow<OcrResult> = flow {
        emit(OcrResult.Loading)
        try {
            val fd = context.contentResolver.openFileDescriptor(uri, "r")
                ?: throw Exception("File खोल्न सकिएन")
            val renderer = PdfRenderer(fd)
            val sb = StringBuilder()

            for (i in 0 until renderer.pageCount) {
                emit(OcrResult.Progress(i + 1, renderer.pageCount))
                val page = renderer.openPage(i)
                val bitmap = Bitmap.createBitmap(
                    (page.width * 1.5).toInt(),
                    (page.height * 1.5).toInt(),
                    Bitmap.Config.ARGB_8888
                )
                page.render(bitmap, null, null, PdfRenderer.Page.RENDER_MODE_FOR_DISPLAY)
                page.close()

                val pageText = performOcr(bitmap)
                sb.appendLine("--- Page ${i + 1} ---")
                sb.appendLine(pageText)
                bitmap.recycle()
            }

            renderer.close()
            fd.close()
            emit(OcrResult.Success(sb.toString()))
        } catch (e: Exception) {
            emit(OcrResult.Error(e.message ?: "PDF OCR failed"))
        }
    }

    private suspend fun performOcr(bitmap: Bitmap): String =
        suspendCancellableCoroutine { cont ->
            val image = InputImage.fromBitmap(bitmap, 0)
            recognizer.process(image)
                .addOnSuccessListener { cont.resume(it.text) }
                .addOnFailureListener { cont.resume("") }
        }
}

sealed class OcrResult {
    object Loading : OcrResult()
    data class Progress(val current: Int, val total: Int) : OcrResult()
    data class Success(val text: String) : OcrResult()
    data class Error(val message: String) : OcrResult()
}
""")

# ─── Table Extractor ───────────────────────────────────────────────────────
write(f"{SRC}/ocr/TableExtractor.kt", """\
package com.nareshkushmi.nkreader.ocr

import android.content.Context
import android.graphics.Bitmap
import com.google.mlkit.vision.common.InputImage
import com.google.mlkit.vision.text.TextRecognition
import com.google.mlkit.vision.text.devanagari.DevanagariTextRecognizerOptions
import kotlinx.coroutines.suspendCancellableCoroutine
import org.opencv.android.Utils
import org.opencv.core.*
import org.opencv.imgproc.Imgproc
import kotlin.coroutines.resume

class TableExtractor(private val context: Context) {

    private val recognizer = TextRecognition.getClient(
        DevanagariTextRecognizerOptions.Builder().build()
    )

    fun detectTableCells(bitmap: Bitmap): List<Rect> {
        val src = Mat()
        Utils.bitmapToMat(bitmap, src)
        val gray = Mat()
        Imgproc.cvtColor(src, gray, Imgproc.COLOR_BGR2GRAY)
        val thresh = Mat()
        Imgproc.threshold(gray, thresh, 150.0, 255.0, Imgproc.THRESH_BINARY_INV)

        val horizontal = Mat()
        val hKernel = Imgproc.getStructuringElement(
            Imgproc.MORPH_RECT, Size(bitmap.width / 30.0, 1.0)
        )
        Imgproc.morphologyEx(thresh, horizontal, Imgproc.MORPH_OPEN, hKernel)

        val vertical = Mat()
        val vKernel = Imgproc.getStructuringElement(
            Imgproc.MORPH_RECT, Size(1.0, bitmap.height / 30.0)
        )
        Imgproc.morphologyEx(thresh, vertical, Imgproc.MORPH_OPEN, vKernel)

        val combined = Mat()
        Core.add(horizontal, vertical, combined)

        val contours = mutableListOf<MatOfPoint>()
        Imgproc.findContours(
            combined, contours, Mat(),
            Imgproc.RETR_TREE, Imgproc.CHAIN_APPROX_SIMPLE
        )

        return contours
            .map { Imgproc.boundingRect(it) }
            .filter { it.width > 30 && it.height > 15 }
            .sortedWith(compareBy({ it.y }, { it.x }))
    }

    fun groupCellsIntoRows(cells: List<Rect>): List<List<Rect>> {
        val rows = mutableListOf<MutableList<Rect>>()
        for (cell in cells) {
            val row = rows.find { kotlin.math.abs(it.first().y - cell.y) < 10 }
            if (row != null) row.add(cell)
            else rows.add(mutableListOf(cell))
        }
        return rows.map { it.sortedBy { c -> c.x } }
    }

    suspend fun extractTable(bitmap: Bitmap): List<List<String>> {
        val cells = detectTableCells(bitmap)
        val rows = groupCellsIntoRows(cells)
        return rows.map { row -> row.map { cell -> ocrCell(bitmap, cell) } }
    }

    private suspend fun ocrCell(bitmap: Bitmap, cell: Rect): String =
        suspendCancellableCoroutine { cont ->
            val cropped = Bitmap.createBitmap(bitmap, cell.x, cell.y, cell.width, cell.height)
            val image = InputImage.fromBitmap(cropped, 0)
            recognizer.process(image)
                .addOnSuccessListener { cont.resume(it.text.trim()) }
                .addOnFailureListener { cont.resume("") }
        }

    fun tableToString(table: List<List<String>>): String =
        table.joinToString("\\n") { row -> row.joinToString(" | ") }

    fun tableToCsv(table: List<List<String>>): String =
        table.joinToString("\\n") { row ->
            row.joinToString(",") { cell -> "\\"${cell.replace("\\"", "\\"\\"")}\\"" }
        }
}
""")


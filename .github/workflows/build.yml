name: Build NK Reader APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install Pillow

      - name: Generate project files
        run: |
          echo "" | base64 -d > generate_project.py
          python3 generate_project.py

      - name: Setup Gradle wrapper
        run: |
          cd NKReader
          gradle wrapper --gradle-version 8.2 --distribution-type bin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x NKReader/gradlew

      - name: Build Debug APK
        run: |
          cd NKReader
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NK-Reader-Debug-APK
          path: NKReader/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## NK Reader Build सफल भयो!" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | NK Reader |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | com.nareshkushmi.nkreader |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | app-debug.apk |" >> $GITHUB_STEP_SUMMARY
